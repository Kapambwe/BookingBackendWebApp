    <!-- Performance Monitoring -->
    <script>
        (function() {
            window.addEventListener('load', function() {
                setTimeout(function() {
                    try {
                        const perfData = performance.getEntriesByType('resource');
                        const dllFiles = perfData.filter(r => r.name.includes('.dll') || r.name.includes('.wasm'));
                        const jsFiles = perfData.filter(r => r.name.includes('.js') && !r.name.includes('_framework'));

                        const totalDllSize = dllFiles.reduce((sum, r) => sum + (r.transferSize || 0), 0);
                        const totalJsSize = jsFiles.reduce((sum, r) => sum + (r.transferSize || 0), 0);
                        const totalSize = totalDllSize + totalJsSize;

                        console.log('%cðŸ“Š Tourism Portal Performance Metrics', 'color: #00897B; font-size: 16px; font-weight: bold;');
                        console.log('%câ”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”', 'color: #00897B;');
                        console.log('ðŸ”¹ DLLs loaded:', dllFiles.length);
                        console.log('ðŸ”¹ Total DLL size:', (totalDllSize / 1024 / 1024).toFixed(2), 'MB');
                        console.log('ðŸ”¹ Total JS size:', (totalJsSize / 1024 / 1024).toFixed(2), 'MB');
                        console.log('ðŸ”¹ Total download:', (totalSize / 1024 / 1024).toFixed(2), 'MB');
                        console.log('%câ”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”â”', 'color: #00897B;');

                        const navTiming = performance.getEntriesByType('navigation')[0];
                        if (navTiming) {
                            console.log('â±ï¸ Page Load Time:', (navTiming.loadEventEnd - navTiming.fetchStart).toFixed(0), 'ms');
                            console.log('â±ï¸ DOM Content Loaded:', (navTiming.domContentLoadedEventEnd - navTiming.fetchStart).toFixed(0), 'ms');
                            console.log('â±ï¸ Time to Interactive:', (navTiming.domInteractive - navTiming.fetchStart).toFixed(0), 'ms');
                        }

                        window.tourismPortalMetrics = {
                            dllCount: dllFiles.length,
                            dllSizeMB: (totalDllSize / 1024 / 1024),
                            jsSizeMB: (totalJsSize / 1024 / 1024),
                            totalSizeMB: (totalSize / 1024 / 1024),
                            loadTimeMs: navTiming ? (navTiming.loadEventEnd - navTiming.fetchStart) : 0,
                            timestamp: new Date().toISOString()
                        };
                    } catch (err) {
                        console.error('Error collecting performance metrics:', err);
                    }
                }, 2000);
            });

            window.trackFeatureAccess = function(featureName) {
                if (!window.featureAccessLog) {
                    window.featureAccessLog = [];
                }
                const access = {
                    feature: featureName,
                    timestamp: new Date().toISOString(),
                    url: window.location.pathname
                };
                window.featureAccessLog.push(access);
                console.log('%cðŸ“ Feature Loaded: ' + featureName, 'color: #9C27B0; font-weight: bold;', access);
            };
        })();
    </script>
